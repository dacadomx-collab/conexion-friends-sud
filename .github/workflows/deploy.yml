name: 🚀 Deploy Conexión FRIENDS al Servidor FTP

on:
  push:
    branches:
      - main  # O 'master', dependiendo de cómo se llame tu rama principal

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Clonar el código
        uses: actions/checkout@v4

      - name: ⚙️ Configurar Node.js (Next 16)
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Versión estable recomendada para Next 16+

      - name: 📦 Instalar dependencias
        run: npm ci || npm install

      - name: 🏗️ Construir Frontend (Generar carpeta 'out')
        run: npm run build

      - name: 🔄 Preparar archivos para subir
        # Aquí copiamos los PHP (asumiendo que están en una carpeta 'api') dentro de 'out' 
        # para que se suba todo el paquete junto y ordenado.
        run: |
          mkdir -p out/api
          cp -R api/* out/api/ || true
          cp *.php out/ || true

      - name: 🚀 Subir por FTP al servidor
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ftp.tecnidepot.com
          username: friends_conex@friends.tecnidepot.com
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21
          protocol: ftp
          local-dir: ./out/
          # Nota de Arquitecto: 'local-dir: ./out/' significa que SOLO el contenido
          # de esta carpeta se subirá a la raíz de tu dominio friends.tecnidepot.com