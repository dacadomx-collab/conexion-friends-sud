name: 🚀 Deploy Conexión FRIENDS al Servidor FTP

on:
  push:
    branches:
      - main 

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Clonar el código
        uses: actions/checkout@v4

      - name: ⚙️ Configurar Node.js (Next 16)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 Instalar dependencias
        run: npm ci || npm install

      - name: 🏗️ Construir Frontend (Generar carpeta 'out')
        run: npm run build

      - name: 🔄 Preparar archivos para subir
        run: |
          mkdir -p out/api
          cp -R api/* out/api/ || true
          cp *.php out/ || true
          cp .htaccess out/ || true
          cp -R Manual out/Manual/ || true

      - name: 🚀 Subir por FTP al servidor
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ftp.tecnidepot.com
          username: friends_conex@friends.tecnidepot.com
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21
          protocol: ftp
          local-dir: ./out/
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            .env*
            uploads/**
            api/conexion.php